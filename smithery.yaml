name: "@foundrynet/financial-signals-mcp"
displayName: "FoundryNet Financial Intelligence"
description: >-
  Insider trading detection, earnings surprise analysis, institutional ownership changes, composite stock scoring, and macro indicators.
icon: "📊"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/financial-signals-mcp"
license: "MIT"
categories:
  - finance
  - data
  - research
tags:
  - stock-analysis
  - insider-trading
  - earnings
  - financial-ratios
  - market-intelligence
  - sec-filings
keywords:
  - stock-analysis
  - insider-trading
  - earnings
  - financial-ratios
  - market-intelligence
  - sec-filings
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://financial-signals-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
