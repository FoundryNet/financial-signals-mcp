name: "@foundrynet/financial-signals"
displayName: "Financial Signals MCP"
description: >-
  Derived financial intelligence for AI agents — not raw filings. Insider trading
  patterns, earnings surprises and beat streaks, institutional ownership moves,
  financial ratios with a proprietary composite value score, stock screening,
  sector snapshots, macro signals, and cross-company anomaly detection. A
  free-tier alternative to FactSet/Morningstar/S&P Capital IQ. Part of the
  FoundryNet Data Network. Free tier then x402 (USDC on Solana).
startCommand:
  type: http
  url: "https://financial-signals-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
